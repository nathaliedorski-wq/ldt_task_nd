version: '3.8'

services:
  # The VS Code dev environment
  jspsych-dev-workspace:
    image: mcr.microsoft.com/devcontainers/javascript-node:20
    volumes:
      # Map the local workspace root to /workspace in the container
      - ..:/workspace:cached
    # Keeps the container running
    command: /bin/sh -c "while sleep 1000; do :; done"
    depends_on:
      - jatos

  # The JATOS Server
  jatos:
    image: jatos/jatos:latest
    user: "root"
    ports:
      - "9000:9000"
    environment:
      # Ensures JATOS uses the default local file-based database
      - JATOS_DB_DRIVER=org.h2.Driver
    volumes:
      # CORRECTED: Internal paths are now properly set to /opt/jatos_data/...
      - ../jatos_data/database:/opt/jatos_data/database
      - ../jatos_data/study_assets_root:/opt/jatos_data/study_assets_root
    restart: unless-stopped