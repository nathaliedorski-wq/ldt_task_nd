<!DOCTYPE html>
<html>
<head>
    <title>Consent and Screening</title>
    <!-- jsPsych v8 and CSS -->
     <link href="https://unpkg.com/jspsych@8.0.0/css/jspsych.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
     <script src="https://unpkg.com/jspsych@8.0.0/dist/index.browser.min.js" crossorigin="anonymous"></script>
    
    <!-- Survey Plugins -->
    <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@2.0.0" crossorigin="anonymous"></script>

             border-radius: 10px;

        .jspsych-survey-multi-choice-question { margin-bottom: 2.5em; }

<body>
    <div id="jspsych-target" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
    
    <script src="js/survey_logic.js"></script>
