<!DOCTYPE html>
<html lang="en">


<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lexical Decision Task</title>

  <!-- 1. jsPsych v8 Core CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/jspsych@8.0.0/css/jspsych.css" crossorigin="anonymous" />
  <script src="https://unpkg.com/jspsych@8.0.0/dist/index.browser.min.js" crossorigin="anonymous"></script>

  <!-- 2. Official v8 Plugins (Use the /dist/ path) -->
  <script src="https://unpkg.com/@jspsych/plugin-preload@2.0.0/dist/index.browser.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.0.0/dist/index.browser.min.js" crossorigin="anonymous"></script>

    <!-- This is the direct link to the jsPsych v8 version on GitHub -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js" crossorigin="anonymous"></script>
<!-- This is the browser-ready version of the @kurokida package -->

  <!-- 5. JATOS (Don't forget this!) -->

  <link rel="stylesheet" href="css/style.css" />

  <style>
    .jspsych-display-element {
      background-color: transparent !important;

      background-color: transparent !important;

<body>
  <video id="distractor-video" muted loop playsinline

    <source src="stimuli/background_small.mp4" type="video/mp4" />
  </video>

  <div id="jspsych-target" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></div>

  <script src="js/main.js"></script>
